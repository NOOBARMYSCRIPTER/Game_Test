<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Math Duel: Magic Caster</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #141419;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        #canvas-wrapper {
            position: relative;
            width: 1280px;
            height: 720px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 8px;
            background-color: #000;
        }

        canvas.emscripten {
            position: absolute;
            top: 0;
            left: 0;
            width: 1280px !important;
            height: 720px !important;
            border: none;
            z-index: 1;
        }

        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 1280px;
            height: 720px;
            z-index: 10;
            pointer-events: none;
        }

        .screen-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
            border-radius: 8px;
        }

        #start-screen { background: rgba(10, 10, 15, 0.85); }
        #game-over-screen { background: rgba(30, 5, 5, 0.9); display: none; }

        .game-over-title {
            font-size: 48px;
            font-weight: bold;
            color: #ff4444;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .btn-ui {
            padding: 18px 45px;
            font-size: 26px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-start { background: #2463eb; box-shadow: 0 5px 15px rgba(36, 99, 235, 0.4); }
        .btn-start:hover { background: #1d4ed8; transform: scale(1.05); }
        .btn-restart { background: #dc2626; box-shadow: 0 5px 15px rgba(220, 38, 38, 0.4); }
        .btn-restart:hover { background: #b91c1c; transform: scale(1.05); }

        .monster-plate {
            position: absolute;
            background: rgba(25, 25, 35, 0.95);
            border: 2px solid #ff4444;
            padding: 10px 18px;
            border-radius: 8px;
            transform: translate(-50%, -120%);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
        }

        .challenge-text { font-size: 18px; font-weight: bold; color: #ff6b6b; }

        #gesture-debug {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 30, 0.8);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 18px;
            font-weight: bold;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #gesture-value { color: #4ade80; font-size: 24px; }

        #webcam {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 320px;
            height: 240px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline muted width="320" height="240"></video>

    <div id="canvas-wrapper">
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

        <div id="game-ui">
            <div id="gesture-debug">Пальцев на камере: <span id="gesture-value">0</span></div>

            <div id="start-screen" class="screen-overlay">
                <button class="btn-ui btn-start" id="start-btn" onclick="ClickStartGame()">НАЧАТЬ ИГРУ</button>
            </div>

            <div id="game-over-screen" class="screen-overlay">
                <div class="game-over-title">Монстры поглотили тебя!</div>
                <button class="btn-ui btn-restart" onclick="ClickRestartGame()">ПОПРОБОВАТЬ СНОВА</button>
            </div>

            <div id="monsters-container"></div>
        </div>
    </div>

    <script type='text/javascript'>
        var Module = {
            canvas: (function() { return document.getElementById('canvas'); })()
        };

        let lastSentFingers = -1;
        let hands = null;
        let isProcessing = false;

        window.addEventListener('DOMContentLoaded', () => {
            InitMediaPipeDirect();
        });

        function ClickStartGame() {
            document.getElementById('start-screen').style.display = 'none';
            StartSession();
        }

        function ClickRestartGame() {
            document.getElementById('game-over-screen').style.display = 'none';
            StartSession();
        }

        function StartSession() {
            if (typeof Module.ccall === 'function') {
                Module.ccall('StartGameSession', null, [], []);
            }
        }

        Module.showGameOver = function() {
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('monsters-container').innerHTML = '';
        };

        Module.updateMonsterUI = function(id, challengeText, pctX, pctY) {
            let container = document.getElementById('monsters-container');
            let plate = document.getElementById('monster-' + id);

            if (!plate) {
                plate = document.createElement('div');
                plate.id = 'monster-' + id;
                plate.className = 'monster-plate';
                plate.innerHTML = `
                    <div class="challenge-text">${challengeText}</div>
                    <div style="color: #aaa; font-size: 12px; text-align:center;">Покажи ответ</div>
                `;
                container.appendChild(plate);
            }

            plate.style.left = (pctX * 1280) + 'px';
            plate.style.top = (pctY * 720) + 'px';
        };

        Module.removeMonsterUI = function(id) {
            let plate = document.getElementById('monster-' + id);
            if (plate) plate.remove();
        };

        function InitMediaPipeDirect() {
            const videoElement = document.getElementById('webcam');
            
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 0,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onHandResults);

            navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } })
                .then(function(stream) {
                    videoElement.srcObject = stream;
                    videoElement.addEventListener('loadedmetadata', () => {
                        setInterval(tickTracking, 80);
                    });
                })
                .catch(err => console.error("Доступ к камере отклонен:", err));
        }

        async function tickTracking() {
            const videoElement = document.getElementById('webcam');
            
            if (!isProcessing && videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                isProcessing = true;
                try {
                    await hands.send({ image: videoElement });
                } catch (e) {
                    isProcessing = false;
                }
            }
        }

        function onHandResults(results) {
            let fingersCount = 0;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const fingerTips = [8, 12, 16, 20];
                
                fingerTips.forEach(tip => {
                    if (landmarks[tip].y < landmarks[tip - 3].y) {
                        fingersCount++;
                    }
                });

                const isLeftHand = results.multiHandedness[0].label === 'Left';
                if (isLeftHand) {
                    if (landmarks[4].x > landmarks[3].x) fingersCount++;
                } else {
                    if (landmarks[4].x < landmarks[3].x) fingersCount++;
                }
            }

            document.getElementById('gesture-value').innerText = fingersCount;

            if (fingersCount !== lastSentFingers && fingersCount > 0) {
                lastSentFingers = fingersCount;
                if (typeof Module.ccall === 'function') {
                    Module.ccall('RegisterGestureResult', null, ['int'], [fingersCount]);
                }
            } else if (fingersCount === 0) {
                lastSentFingers = 0;
            }

            isProcessing = false;
        }
    </script>
    
    {{{ SCRIPT }}}

</body>
</html>
