<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Duel: Magic Caster</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #141419;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            background-color: #000;
        }
        
        @media (max-aspect-ratio: 16/9) {
            #canvas-wrapper {
                width: 100vw;
                height: calc(100vw * 9 / 16);
            }
        }

        canvas.emscripten {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none;
            z-index: 1;
        }

        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .screen-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
        }

        #start-screen { background: rgba(10, 10, 15, 0.9); }
        #game-over-screen { background: rgba(30, 5, 5, 0.93); display: none; }

        .game-over-title {
            font-size: 5vw;
            max-size: 48px;
            font-weight: bold;
            color: #ff4444;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
        }

        .btn-ui {
            padding: 14px 35px;
            font-size: 4vw;
            max-font-size: 26px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        @media (min-width: 769px) {
            .game-over-title { font-size: 48px; }
            .btn-ui { font-size: 26px; padding: 18px 45px; }
        }
        
        .btn-start { background: #2463eb; box-shadow: 0 5px 15px rgba(36, 99, 235, 0.4); }
        .btn-start:hover { background: #1d4ed8; transform: scale(1.05); }
        .btn-restart { background: #dc2626; box-shadow: 0 5px 15px rgba(220, 38, 38, 0.4); }
        .btn-restart:hover { background: #b91c1c; transform: scale(1.05); }

        .monster-plate {
            position: absolute;
            background: rgba(15, 15, 22, 0.95);
            border: 2px solid #ff4444;
            padding: 8px 14px;
            border-radius: 8px;
            transform: translate(-50%, -100%);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
            transition: left 0.1s linear, top 0.1s linear;
        }

        .challenge-text { 
            font-size: 20px; 
            font-weight: 900; 
            color: #ff5555; 
            text-shadow: 0 0 10px rgba(255,68,68,0.3);
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .monster-plate {
                background: #1a1a24;
                border: 3px solid #ff3b30;
                padding: 12px 20px;
                border-radius: 12px;
                box-shadow: 0 0 15px rgba(255, 59, 48, 0.4), inset 0 0 8px rgba(0,0,0,0.8);
            }
            .challenge-text { 
                font-size: 28px;
                color: #ff3b30;
                text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            }
            #gesture-debug {
                padding: 8px 12px !important;
                font-size: 14px !important;
            }
            #gesture-value { font-size: 18px !important; }
        }

        #gesture-debug {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(20, 20, 30, 0.85);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 18px;
            font-weight: bold;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }
        #gesture-value { color: #4ade80; font-size: 24px; }

        #webcam { display: none; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline muted width="320" height="240"></video>

    <div id="canvas-wrapper" id="wrapper">
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

        <div id="game-ui">
            <div id="gesture-debug">Камера: <span id="gesture-value">0</span></div>

            <div id="start-screen" class="screen-overlay">
                <button class="btn-ui btn-start" id="start-btn" onclick="ClickStartGame()" disabled style="opacity: 0.5;">ЗАГРУЗКА ЯДРА И МОДЕЛИ...</button>
            </div>

            <div id="game-over-screen" class="screen-overlay">
                <div class="game-over-title">Монстры поглотили тебя!</div>
                <button class="btn-ui btn-restart" onclick="ClickRestartGame()">ПОПРОБОВАТЬ СНОВА</button>
            </div>

            <div id="monsters-container"></div>
        </div>
    </div>

    <script type='text/javascript'>
        var Module = {
            canvas: (function() { return document.getElementById('canvas'); })()
        };

        let lastSentFingers = -1;
        let cameraReady = false;
        let aiReady = false;
        let isProcessing = false; 

        const offscreenCanvas = document.createElement('canvas');
        const offscreenCtx = offscreenCanvas.getContext('2d');
        offscreenCanvas.width = 320;
        offscreenCanvas.height = 240;

        const workerCode = `
            let handLandmarker;

            async function init() {
                try {
                    const mp = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/vision_bundle.mjs");
                    const FilesetResolver = mp.FilesetResolver;
                    const HandLandmarker = mp.HandLandmarker;

                    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm");
                    
                    handLandmarker = await HandLandmarker.createFromOptions(vision, {
                        baseOptions: {
                            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                            delegate: "GPU"
                        },
                        runningMode: "IMAGE",
                        numHands: 2
                    });
                    self.postMessage({ type: 'READY' });
                } catch(e) {
                    self.postMessage({ type: 'ERROR', error: e.toString() });
                }
            }

            self.onmessage = async (e) => {
                if (e.data.type === 'INIT') {
                    await init();
                }
                if (e.data.type === 'PROCESS_FRAME' && handLandmarker) {
                    try {
                        const { imageData } = e.data;
                        const results = handLandmarker.detect(imageData);
                        
                        let totalFingers = 0;

                        if (results.landmarks && results.landmarks.length > 0) {
                            for (let h = 0; h < results.landmarks.length; h++) {
                                const landmarks = results.landmarks[h];

                                const fingerTips = [8, 12, 16, 20];
                                fingerTips.forEach(tip => {
                                    if (landmarks[tip].y < landmarks[tip - 2].y) {
                                        totalFingers++;
                                    }
                                });

                                const distTipToPinky = Math.abs(landmarks[4].x - landmarks[17].x);
                                const distJointToPinky = Math.abs(landmarks[3].x - landmarks[17].x);
                                
                                if (distTipToPinky > distJointToPinky + 0.02) {
                                    totalFingers++;
                                }
                            }
                        }

                        if (totalFingers > 10) totalFingers = 10;

                        self.postMessage({ type: 'RESULT', fingersCount: totalFingers });
                    } catch(err) {
                        self.postMessage({ type: 'RESULT', fingersCount: 0 });
                    }
                }
            };
        `;

        const mobilePolyfill = `
            self.import = async function(url) {
                if(url.includes("vision_bundle.mjs")) {
                    importScripts("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/tasks_vision.js");
                    return {
                        FilesetResolver: mpTasksVision.FilesetResolver,
                        HandLandmarker: mpTasksVision.HandLandmarker
                    };
                }
                importScripts(url);
                return self;
            };
        `;

        const blob = new Blob([mobilePolyfill, workerCode], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);
        const worker = new Worker(workerUrl); 

        window.addEventListener('DOMContentLoaded', () => {
            StartCameraImmediate();
            const startBtn = document.getElementById('start-btn');
            startBtn.innerText = "ЗАГРУЗКА ЯДРА И МОДЕЛИ...";
            worker.postMessage({ type: 'INIT' });
        });

        worker.onmessage = (e) => {
            if (e.data.type === 'READY') {
                aiReady = true;
                checkReadyState();
            }
            if (e.data.type === 'ERROR') {
                console.error("Ошибка внутри ИИ-потока:", e.data.error);
                document.getElementById('start-btn').innerText = "ОШИБКА ЗАГРУЗКИ СЕТИ";
            }
            if (e.data.type === 'RESULT') {
                let fingersCount = e.data.fingersCount;
                document.getElementById('gesture-value').innerText = fingersCount;

                if (fingersCount !== lastSentFingers && fingersCount > 0) {
                    lastSentFingers = fingersCount;
                    if (typeof Module.ccall === 'function') {
                        Module.ccall('RegisterGestureResult', null, ['int'], [fingersCount]);
                    }
                } else if (fingersCount === 0) {
                    lastSentFingers = 0;
                }
                
                isProcessing = false; 
            }
        };

        function ClickStartGame() {
            document.getElementById('start-screen').style.display = 'none';
            StartSession();
        }

        function ClickRestartGame() {
            document.getElementById('game-over-screen').style.display = 'none';
            StartSession();
        }

        function StartSession() {
            if (typeof Module.ccall === 'function') {
                Module.ccall('StartGameSession', null, [], []);
            }
        }

        Module.showGameOver = function() {
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('monsters-container').innerHTML = '';
        };

        Module.updateMonsterUI = function(id, challengeText, pctX, pctY) {
            let container = document.getElementById('monsters-container');
            let plate = document.getElementById('monster-' + id);
            let wrapper = document.getElementById('canvas-wrapper');

            if (!plate) {
                plate = document.createElement('div');
                plate.id = 'monster-' + id;
                plate.className = 'monster-plate';
                plate.innerHTML = `
                    <div class="challenge-text">${challengeText}</div>
                    <div class="sub-info" style="color: #aaa; font-size: 10px; text-align:center; text-transform: uppercase; font-weight: bold; margin-top: 2px;">Ответ</div>
                `;
                container.appendChild(plate);
            }

            let rect = wrapper.getBoundingClientRect();

            plate.style.left = (pctX * rect.width) + 'px';
            plate.style.top = (pctY * rect.height) + 'px';
        };

        Module.removeMonsterUI = function(id) {
            let plate = document.getElementById('monster-' + id);
            if (plate) plate.remove();
        };

        function StartCameraImmediate() {
            const videoElement = document.getElementById('webcam');
            const startBtn = document.getElementById('start-btn');

            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 320 }, 
                    height: { ideal: 240 },
                    facingMode: "user"
                } 
            })
            .then(function(stream) {
                videoElement.srcObject = stream;
                videoElement.addEventListener('loadedmetadata', () => {
                    cameraReady = true;
                    checkReadyState();
                });
            })
            .catch(err => {
                console.error("Камера недоступна:", err);
                startBtn.innerText = 'ДОСТУП К КАМЕРЕ ЗАБЛОКИРОВАН';
            });
        }

        function checkReadyState() {
            const startBtn = document.getElementById('start-btn');
            if (aiReady && cameraReady) {
                startBtn.removeAttribute('disabled');
                startBtn.style.opacity = '1';
                startBtn.innerText = 'НАЧАТЬ ИГРУ';

                setInterval(processVideoFrame, 40); 
            }
        }

        function processVideoFrame() {
            const videoElement = document.getElementById('webcam');

            if (aiReady && !isProcessing && videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                isProcessing = true; 
                
                offscreenCtx.drawImage(videoElement, 0, 0, 320, 240);
                const imageData = offscreenCtx.getImageData(0, 0, 320, 240);

                worker.postMessage({
                    type: 'PROCESS_FRAME',
                    imageData: imageData
                }, [imageData.data.buffer]);
            }
        }
    </script>
    
    {{{ SCRIPT }}}

</body>
</html>
