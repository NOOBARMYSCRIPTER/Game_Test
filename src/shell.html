<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Math Duel: Magic Caster</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #141419;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        #canvas-wrapper {
            position: relative;
            width: 1280px;
            height: 720px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 8px;
            background-color: #000;
        }

        canvas.emscripten {
            position: absolute;
            top: 0;
            left: 0;
            width: 1280px !important;
            height: 720px !important;
            border: none;
            z-index: 1;
        }

        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 1280px;
            height: 720px;
            z-index: 10;
            pointer-events: none;
        }

        .screen-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
            border-radius: 8px;
        }

        #start-screen { background: rgba(10, 10, 15, 0.85); }
        #game-over-screen { background: rgba(30, 5, 5, 0.9); display: none; }

        .game-over-title {
            font-size: 48px;
            font-weight: bold;
            color: #ff4444;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .btn-ui {
            padding: 18px 45px;
            font-size: 26px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-start { background: #2463eb; box-shadow: 0 5px 15px rgba(36, 99, 235, 0.4); }
        .btn-start:hover { background: #1d4ed8; transform: scale(1.05); }
        .btn-restart { background: #dc2626; box-shadow: 0 5px 15px rgba(220, 38, 38, 0.4); }
        .btn-restart:hover { background: #b91c1c; transform: scale(1.05); }

        .monster-plate {
            position: absolute;
            background: rgba(25, 25, 35, 0.95);
            border: 2px solid #ff4444;
            padding: 10px 18px;
            border-radius: 8px;
            transform: translate(-50%, -120%);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
        }

        .challenge-text { font-size: 18px; font-weight: bold; color: #ff6b6b; }

        #gesture-debug {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 30, 0.8);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 18px;
            font-weight: bold;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #gesture-value { color: #4ade80; font-size: 24px; }

        #webcam { display: none; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline muted width="320" height="240"></video>

    <div id="canvas-wrapper">
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

        <div id="game-ui">
            <div id="gesture-debug">Пальцев на камере: <span id="gesture-value">0</span></div>

            <div id="start-screen" class="screen-overlay">
                <button class="btn-ui btn-start" id="start-btn" onclick="ClickStartGame()" disabled style="opacity: 0.5;">ЗАГРУЗКА ЯДРА И МОДЕЛИ...</button>
            </div>

            <div id="game-over-screen" class="screen-overlay">
                <div class="game-over-title">Монстры поглотили тебя!</div>
                <button class="btn-ui btn-restart" onclick="ClickRestartGame()">ПОПРОБОВАТЬ СНОВА</button>
            </div>

            <div id="monsters-container"></div>
        </div>
    </div>

    <script type='text/javascript'>
        var Module = {
            canvas: (function() { return document.getElementById('canvas'); })()
        };

        let lastSentFingers = -1;
        let cameraReady = false;
        let aiReady = false;
        let isProcessing = false; 

        const offscreenCanvas = document.createElement('canvas');
        const offscreenCtx = offscreenCanvas.getContext('2d');
        offscreenCanvas.width = 320;
        offscreenCanvas.height = 240;

        const workerCode = `
            importScripts("https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js");
        
            let hands;
        
            function init() {
                try {
                    hands = new self.Hands({
                        locateFile: (file) => {
                            return "https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/" + file;
                        }
                    });
        
                    hands.setOptions({
                        maxNumHands: 2,
                        modelComplexity: 1,
                        minDetectionConfidence: 0.5,
                        minTrackingConfidence: 0.5
                    });
        
                    hands.onResults((results) => {
                        let totalFingers = 0;
        
                        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                            for (let h = 0; h < results.multiHandLandmarks.length; h++) {
                                const landmarks = results.multiHandLandmarks[h];
                                
                                const fingerTips =;
                                fingerTips.forEach(tip => {
                                    if (landmarks[tip].y < landmarks[tip - 2].y) {
                                        totalFingers++;
                                    }
                                });
        
                                if (results.multiHandedness && results.multiHandedness[h]) {
                                    const isLeftHand = results.multiHandedness[h].label === 'Left';
                                    if (isLeftHand) {
                                        if (landmarks.x > landmarks.x + 0.02) totalFingers++;
                                    } else {
                                        if (landmarks.x < landmarks.x - 0.02) totalFingers++;
                                    }
                                }
                            }
                        }
        
                        if (totalFingers > 10) totalFingers = 10;
                        self.postMessage({ type: 'RESULT', fingersCount: totalFingers });
                    });
        
                    self.postMessage({ type: 'READY' });
                } catch(e) {
                    self.postMessage({ type: 'ERROR', error: e.toString() });
                }
            }
        
            self.onmessage = async (e) => {
                if (e.data.type === 'INIT') {
                    init();
                }
                if (e.data.type === 'PROCESS_FRAME' && hands) {
                    try {
                        await hands.send({ image: e.data.imageData });
                    } catch(err) {
                        self.postMessage({ type: 'RESULT', fingersCount: 0, error: err.toString() });
                    }
                }
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);
        const worker = new Worker(workerUrl); 

        window.addEventListener('DOMContentLoaded', () => {
            StartCameraImmediate();
            const startBtn = document.getElementById('start-btn');
            startBtn.innerText = "ЗАГРУЗКА ЯДРА И МОДЕЛИ...";
            worker.postMessage({ type: 'INIT' });
        });

        worker.onmessage = (e) => {
            if (e.data.type === 'READY') {
                aiReady = true;
                checkReadyState();
            }
            if (e.data.type === 'ERROR') {
                console.error("Ошибка внутри ИИ-потока:", e.data.error);
                document.getElementById('start-btn').innerText = "ОШИБКА ЗАГРУЗКИ СЕТИ";
            }
            if (e.data.type === 'RESULT') {
                let fingersCount = e.data.fingersCount;
                document.getElementById('gesture-value').innerText = fingersCount;

                if (fingersCount !== lastSentFingers && fingersCount > 0) {
                    lastSentFingers = fingersCount;
                    if (typeof Module.ccall === 'function') {
                        Module.ccall('RegisterGestureResult', null, ['int'], [fingersCount]);
                    }
                } else if (fingersCount === 0) {
                    lastSentFingers = 0;
                }
                
                isProcessing = false; 
            }
        };

        function ClickStartGame() {
            document.getElementById('start-screen').style.display = 'none';
            StartSession();
        }

        function ClickRestartGame() {
            document.getElementById('game-over-screen').style.display = 'none';
            StartSession();
        }

        function StartSession() {
            if (typeof Module.ccall === 'function') {
                Module.ccall('StartGameSession', null, [], []);
            }
        }

        Module.showGameOver = function() {
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('monsters-container').innerHTML = '';
        };

        Module.updateMonsterUI = function(id, challengeText, pctX, pctY) {
            let container = document.getElementById('monsters-container');
            let plate = document.getElementById('monster-' + id);

            if (!plate) {
                plate = document.createElement('div');
                plate.id = 'monster-' + id;
                plate.className = 'monster-plate';
                plate.innerHTML = `
                    <div class="challenge-text">${challengeText}</div>
                    <div style="color: #aaa; font-size: 12px; text-align:center;">Покажи ответ</div>
                `;
                container.appendChild(plate);
            }

            plate.style.left = (pctX * 1280) + 'px';
            plate.style.top = (pctY * 720) + 'px';
        };

        Module.removeMonsterUI = function(id) {
            let plate = document.getElementById('monster-' + id);
            if (plate) plate.remove();
        };

        function StartCameraImmediate() {
            const videoElement = document.getElementById('webcam');
            const startBtn = document.getElementById('start-btn');

            navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } })
                .then(function(stream) {
                    videoElement.srcObject = stream;
                    videoElement.addEventListener('loadedmetadata', () => {
                        cameraReady = true;
                        checkReadyState();
                    });
                })
                .catch(err => {
                    console.error("Камера недоступна:", err);
                    startBtn.innerText = 'ДОСТУП К КАМЕРЕ ЗАБЛОКИРОВАН';
                });
        }

        function checkReadyState() {
            const startBtn = document.getElementById('start-btn');
            if (aiReady && cameraReady) {
                startBtn.removeAttribute('disabled');
                startBtn.style.opacity = '1';
                startBtn.innerText = 'НАЧАТЬ ИГРУ';

                setInterval(processVideoFrame, 40); 
            }
        }

        function processVideoFrame() {
            const videoElement = document.getElementById('webcam');

            if (aiReady && !isProcessing && videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                isProcessing = true; 
                
                offscreenCtx.drawImage(videoElement, 0, 0, 320, 240);
                const imageData = offscreenCtx.getImageData(0, 0, 320, 240);

                worker.postMessage({
                    type: 'PROCESS_FRAME',
                    imageData: imageData
                }, [imageData.data.buffer]);
            }
        }
    </script>
    
    {{{ SCRIPT }}}

</body>
</html>
