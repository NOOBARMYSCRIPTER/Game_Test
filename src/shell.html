<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Math Duel: Magic Caster</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #141419;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        #canvas-wrapper {
            position: relative;
            width: 1280px;
            height: 720px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 8px;
            background-color: #000;
        }

        canvas.emscripten {
            position: absolute;
            top: 0;
            left: 0;
            width: 1280px !important;
            height: 720px !important;
            border: none;
            z-index: 1;
        }

        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 1280px;
            height: 720px;
            z-index: 10;
            pointer-events: none;
        }

        .screen-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
            border-radius: 8px;
        }

        #start-screen {
            background: rgba(10, 10, 15, 0.85);
        }

        #game-over-screen {
            background: rgba(30, 5, 5, 0.9);
            display: none;
        }

        .game-over-title {
            font-size: 48px;
            font-weight: bold;
            color: #ff4444;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .btn-ui {
            padding: 18px 45px;
            font-size: 26px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-start {
            background: #2463eb;
            box-shadow: 0 5px 15px rgba(36, 99, 235, 0.4);
        }
        .btn-start:hover { 
            background: #1d4ed8; 
            transform: scale(1.05);
        }

        .btn-restart {
            background: #dc2626;
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.4);
        }
        .btn-restart:hover { 
            background: #b91c1c; 
            transform: scale(1.05);
        }

        .monster-plate {
            position: absolute;
            background: rgba(25, 25, 35, 0.95);
            border: 2px solid #ff4444;
            padding: 10px 18px;
            border-radius: 8px;
            transform: translate(-50%, -120%);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
        }

        .challenge-text {
            font-size: 18px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .monster-input {
            width: 70px;
            background: #1a1a1f;
            border: 2px solid #444;
            color: #fff;
            padding: 5px;
            text-align: center;
            font-size: 18px;
            border-radius: 6px;
            outline: none;
        }
        .monster-input:focus {
            border-color: #ff4444;
        }
    </style>
</head>
<body>

    <div id="canvas-wrapper">
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

        <div id="game-ui">
            <div id="start-screen" class="screen-overlay">
                <button class="btn-ui btn-start" id="start-btn" onclick="ClickStartGame()">НАЧАТЬ ИГРУ</button>
            </div>

            <div id="game-over-screen" class="screen-overlay">
                <div class="game-over-title">Монстры поглотили тебя!</div>
                <button class="btn-ui btn-restart" onclick="ClickRestartGame()">ПОПРОБОВАТЬ СНОВА</button>
            </div>

            <div id="monsters-container"></div>
        </div>
    </div>

    <script type='text/javascript'>
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                return canvas;
            })()
        };

        function ClickStartGame() {
            console.log("JS: Клик по кнопке старта!");
            document.getElementById('start-screen').style.display = 'none';
            StartSession();
        }

        function ClickRestartGame() {
            console.log("JS: Перезапуск сессии!");
            document.getElementById('game-over-screen').style.display = 'none';
            StartSession();
        }

        function StartSession() {
            if (typeof Module.ccall === 'function') {
                Module.ccall('StartGameSession', null, [], []);
            } else {
                console.error("Функции Emscripten (ccall) еще не готовы!");
            }
        }

        Module.showGameOver = function() {
            console.log("JS: Получен сигнал Game Over из WASM!");

            document.getElementById('game-over-screen').style.display = 'flex';
            
            document.getElementById('monsters-container').innerHTML = '';
        };

        Module.updateMonsterUI = function(id, challengeText, pctX, pctY) {
            let container = document.getElementById('monsters-container');
            let plate = document.getElementById('monster-' + id);

            if (!plate) {
                plate = document.createElement('div');
                plate.id = 'monster-' + id;
                plate.className = 'monster-plate';
                plate.innerHTML = `
                    <div class="challenge-text">${challengeText}</div>
                    <input type="number" class="monster-input" placeholder="?" id="input-${id}">
                `;
                container.appendChild(plate);
            }

            let pixelX = pctX * 1280;
            let pixelY = pctY * 720;

            plate.style.left = pixelX + 'px';
            plate.style.top = pixelY + 'px';
        };
    </script>
    
    {{{ SCRIPT }}}

</body>
</html>
